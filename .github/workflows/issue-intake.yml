name: Bob — Issue Intake & ADR-001

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

jobs:
  intake:
    runs-on: ubuntu-latest

    if: |
      contains(github.event.issue.labels.*.name, 'enhancement') ||
      contains(github.event.issue.labels.*.name, 'feature') ||
      contains(toJson(github.event.issue.body), 'Feature:') ||
      contains(toJson(github.event.issue.body), 'Problem')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Bob Shell
        run: curl -fsSL https://bob.ibm.com/download/bobshell.sh | bash -s -- --pm npm

      - name: Build intake prompt
        run: |
          cat .bob/ci-prompts/intake-and-adr001.md \
            | sed "s|{{ISSUE_NUMBER}}|${{ github.event.issue.number }}|g" \
            | sed "s|{{ISSUE_TITLE}}|${{ github.event.issue.title }}|g" \
            > /tmp/prompt.md

          echo "" >> /tmp/prompt.md
          echo "---" >> /tmp/prompt.md
          echo "## Issue Body" >> /tmp/prompt.md
          echo "${{ github.event.issue.body }}" >> /tmp/prompt.md

      - name: Run Bob (non-interactive)
        run: |
          bob --yolo --accept-license --hide-intermediary-output --auth-method api-key "$(cat /tmp/prompt.md)" > /tmp/bob_output.md
        env:
          BOBSHELL_API_KEY: ${{ secrets.BOB_API_KEY }}

      - name: Post intake + ADR-001 as comment
        run: |
          gh issue comment ${{ github.event.issue.number }} --body-file /tmp/bob_output.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Label issue — ADR-001 pending
        run: |
          gh label create "design:intake-complete" --color "0075ca" --force 2>/dev/null || true
          gh label create "design:adr-001-pending" --color "e4e669" --force 2>/dev/null || true
          gh label create "design:adr-002-pending" --color "e4e669" --force 2>/dev/null || true
          gh label create "design:adr-003-pending" --color "e4e669" --force 2>/dev/null || true
          gh label create "design:complete"         --color "0e8a16" --force 2>/dev/null || true

          gh issue edit ${{ github.event.issue.number }} \
            --add-label "design:intake-complete,design:adr-001-pending"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
