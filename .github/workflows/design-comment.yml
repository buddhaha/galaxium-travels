name: Design Session Gate

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  gate:
    runs-on: ubuntu-latest

    if: |
      github.event.issue.pull_request == null &&
      (
        github.event.comment.user.login == github.repository_owner ||
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      ) &&
      (
        contains(github.event.issue.labels.*.name, 'design:adr-001-pending') ||
        contains(github.event.issue.labels.*.name, 'design:adr-002-pending') ||
        contains(github.event.issue.labels.*.name, 'design:adr-003-pending')
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Bob Shell
        run: curl -fsSL https://bob.ibm.com/download/bobshell.sh | bash -s -- --pm npm

      - name: Restore Bob credentials
        run: |
          mkdir -p ~/.bob
          echo "${{ secrets.BOB_SETTINGS }}" | base64 -d > ~/.bob/settings.json
          echo "${{ secrets.BOB_OAUTH_TOKENS }}" | base64 -d > ~/.bob/mcp-oauth-tokens-v2.json

          # Write auth token into the Linux keychain (libsecret)
          sudo apt-get install -y -q libsecret-tools gnome-keyring dbus-x11
          eval "$(dbus-launch --sh-syntax)"
          echo "" | gnome-keyring-daemon --unlock --daemonize --components=secrets
          echo -n "$BOB_SAFE_STORAGE" | secret-tool store \
            --label="IBM Bob Safe Storage" \
            service "IBM Bob Safe Storage" \
            account "IBM Bob Key"
        env:
          BOB_SAFE_STORAGE: ${{ secrets.BOB_SAFE_STORAGE }}

      # ── Determine current phase from labels ─────────────────
      - name: Detect phase
        id: phase
        run: |
          LABELS='${{ toJson(github.event.issue.labels.*.name) }}'
          if echo "$LABELS" | grep -q "design:adr-001-pending"; then
            echo "current=adr-001" >> $GITHUB_OUTPUT
          elif echo "$LABELS" | grep -q "design:adr-002-pending"; then
            echo "current=adr-002" >> $GITHUB_OUTPUT
          elif echo "$LABELS" | grep -q "design:adr-003-pending"; then
            echo "current=adr-003" >> $GITHUB_OUTPUT
          fi

      # ── Parse the human's choice (A, B, or C) ──────────────
      - name: Parse choice
        id: choice
        run: |
          COMMENT="${{ github.event.comment.body }}"
          COMMENT_UPPER=$(echo "$COMMENT" | tr '[:lower:]' '[:upper:]' | tr -d '[:space:]')

          if echo "$COMMENT_UPPER" | grep -qE '^A($|[^A-Z])' || echo "$COMMENT" | grep -iqE '^option a'; then
            echo "choice=A" >> $GITHUB_OUTPUT
          elif echo "$COMMENT_UPPER" | grep -qE '^B($|[^A-Z])' || echo "$COMMENT" | grep -iqE '^option b'; then
            echo "choice=B" >> $GITHUB_OUTPUT
          elif echo "$COMMENT_UPPER" | grep -qE '^C($|[^A-Z])' || echo "$COMMENT" | grep -iqE '^option c'; then
            echo "choice=C" >> $GITHUB_OUTPUT
          else
            echo "choice=UNCLEAR" >> $GITHUB_OUTPUT
          fi

          EXTRA=$(echo "$COMMENT" | sed 's/^[ABCabc]//' | sed 's/^[[:space:]]*//' | sed 's/^with changes:[[:space:]]*//')
          echo "extra=$EXTRA" >> $GITHUB_OUTPUT

      # ── If choice is unclear, ask for clarification ─────────
      - name: Comment — unclear choice
        if: steps.choice.outputs.choice == 'UNCLEAR'
        run: |
          gh issue comment ${{ github.event.issue.number }} --body \
            "I couldn't parse a design choice from your comment. Please reply with **A**, **B**, or **C** (optionally followed by notes, e.g. *\"B with changes: also add a version column\"*)."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Shared helper: call Claude API ──────────────────────
      # Used by all three ADR steps below
      - name: Build ADR-002 prompt
        if: |
          steps.phase.outputs.current == 'adr-001' &&
          steps.choice.outputs.choice != 'UNCLEAR'
        run: |
          cat .bob/ci-prompts/adr002.md \
            | sed "s|{{CHOICE_001}}|${{ steps.choice.outputs.choice }}|g" \
            | sed "s|{{EXTRA_001}}|${{ steps.choice.outputs.extra }}|g" \
            > /tmp/prompt.md

      - name: Run Bob — ADR-002
        id: bob_adr002
        if: |
          steps.phase.outputs.current == 'adr-001' &&
          steps.choice.outputs.choice != 'UNCLEAR'
        run: |
          BOB_OUTPUT=$(bob --yolo --accept-license --hide-intermediary-output "$(cat /tmp/prompt.md)")
          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$BOB_OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post ADR-002 + update labels
        if: |
          steps.phase.outputs.current == 'adr-001' &&
          steps.choice.outputs.choice != 'UNCLEAR'
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "${{ steps.bob_adr002.outputs.output }}"
          gh issue edit ${{ github.event.issue.number }} \
            --remove-label "design:adr-001-pending" \
            --add-label "design:adr-002-pending"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── ADR-002 approved → post ADR-003 ─────────────────────
      - name: Build ADR-003 prompt
        if: |
          steps.phase.outputs.current == 'adr-002' &&
          steps.choice.outputs.choice != 'UNCLEAR'
        run: |
          CHOICE_001=$(gh issue view ${{ github.event.issue.number }} \
            --json comments --jq \
            '[.comments[] | select(.body | startswith("✅ ADR-001"))] | last | .body' \
            | grep -oP 'Option \K[ABC]' | head -1)

          cat .bob/ci-prompts/adr003.md \
            | sed "s|{{CHOICE_001}}|${CHOICE_001:-B}|g" \
            | sed "s|{{CHOICE_002}}|${{ steps.choice.outputs.choice }}|g" \
            | sed "s|{{EXTRA_002}}|${{ steps.choice.outputs.extra }}|g" \
            > /tmp/prompt.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Bob — ADR-003
        id: bob_adr003
        if: |
          steps.phase.outputs.current == 'adr-002' &&
          steps.choice.outputs.choice != 'UNCLEAR'
        run: |
          BOB_OUTPUT=$(bob --yolo --accept-license --hide-intermediary-output "$(cat /tmp/prompt.md)")
          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$BOB_OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post ADR-003 + update labels
        if: |
          steps.phase.outputs.current == 'adr-002' &&
          steps.choice.outputs.choice != 'UNCLEAR'
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "${{ steps.bob_adr003.outputs.output }}"
          gh issue edit ${{ github.event.issue.number }} \
            --remove-label "design:adr-002-pending" \
            --add-label "design:adr-003-pending"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── ADR-003 approved → generate PLAN.md, open PR ────────
      - name: Build PLAN.md prompt
        if: |
          steps.phase.outputs.current == 'adr-003' &&
          steps.choice.outputs.choice != 'UNCLEAR'
        run: |
          ISSUE_BODY=$(gh issue view ${{ github.event.issue.number }} --json body --jq '.body')

          CHOICE_001=$(gh issue view ${{ github.event.issue.number }} \
            --json comments --jq \
            '[.comments[] | select(.body | startswith("✅ ADR-001"))] | last | .body' \
            | grep -oP 'Option \K[ABC]' | head -1)

          CHOICE_002=$(gh issue view ${{ github.event.issue.number }} \
            --json comments --jq \
            '[.comments[] | select(.body | startswith("✅ ADR-002"))] | last | .body' \
            | grep -oP 'Option \K[ABC]' | head -1)

          cat .bob/ci-prompts/generate-plan.md \
            | sed "s|{{ISSUE_NUMBER}}|${{ github.event.issue.number }}|g" \
            | sed "s|{{CHOICE_001}}|${CHOICE_001:-B}|g" \
            | sed "s|{{CHOICE_002}}|${CHOICE_002:-A}|g" \
            | sed "s|{{CHOICE_003}}|${{ steps.choice.outputs.choice }}|g" \
            > /tmp/prompt.md

          echo "" >> /tmp/prompt.md
          echo "---" >> /tmp/prompt.md
          echo "$ISSUE_BODY" >> /tmp/prompt.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Bob — generate PLAN.md
        id: bob_plan
        if: |
          steps.phase.outputs.current == 'adr-003' &&
          steps.choice.outputs.choice != 'UNCLEAR'
        run: |
          BOB_OUTPUT=$(bob --yolo --accept-license --hide-intermediary-output "$(cat /tmp/prompt.md)")
          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$BOB_OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Commit PLAN.md and open PR
        if: |
          steps.phase.outputs.current == 'adr-003' &&
          steps.choice.outputs.choice != 'UNCLEAR'
        run: |
          BRANCH="design/issue-${{ github.event.issue.number }}-group-booking"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          echo "${{ steps.bob_plan.outputs.output }}" > PLAN.md
          git add PLAN.md
          git commit -m "docs: add PLAN.md for issue #${{ github.event.issue.number }} group booking"
          git push origin "$BRANCH"

          PR_URL=$(gh pr create \
            --title "docs: Group Booking design decisions and PLAN.md (issue #${{ github.event.issue.number }})" \
            --body "Design session complete for issue #${{ github.event.issue.number }}.

          **Decisions made:**
          - ADR-001 (Data Model): Option ${{ steps.choice.outputs.choice }}
          - ADR-002 (Atomicity): see issue comments
          - ADR-003 (API Shape): see issue comments

          This PR adds PLAN.md with ordered implementation tasks.
          Review PLAN.md, merge this branch, then start implementation." \
            --head "$BRANCH" \
            --base main)

          gh issue comment ${{ github.event.issue.number }} --body \
            "✅ **Design session complete.** All three decisions locked.

          PLAN.md has been generated and a PR is ready for review: $PR_URL

          Once PLAN.md is merged, implementation starts task by task."

          gh issue edit ${{ github.event.issue.number }} \
            --remove-label "design:adr-003-pending" \
            --add-label "design:complete"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
